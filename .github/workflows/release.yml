name: Release (build + attach installers)

# Builds native bundles for Windows, macOS (universal), Linux, and Android whenever a
# GitHub Release is published, and attaches the artifacts to that release.
#
# Flow: create/publish a Release in the GitHub UI (tag e.g. v0.5.1) -> this
# workflow builds on all three OSes and uploads the installers to it.
# `workflow_dispatch` is also allowed for a manual dry run (no upload unless a
# matching release exists).

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write # required to upload assets to the release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest      # produces a universal (arm64 + x86_64) .app/.dmg
            args: "--target universal-apple-darwin"
          - platform: ubuntu-latest      # .deb / .rpm / .AppImage
            args: ""
          - platform: windows-latest    # NSIS .exe + MSI
            args: ""
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install frontend/CLI dependencies
        run: npm ci

      - name: Import Windows Certificate
        if: matrix.platform == 'windows-latest'
        shell: powershell
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $certBytes = [System.Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
          $certPath = "$env:TEMP\cert.pfx"
          [System.IO.File]::WriteAllBytes($certPath, $certBytes)
          Import-PfxCertificate -FilePath $certPath -CertStoreLocation Cert:\CurrentUser\My -Password (ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText)
          Remove-Item $certPath

      - name: Build and upload to the release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Upload to the release that triggered this run.
          releaseId: ${{ github.event.release.id }}
          args: ${{ matrix.args }}
          assetNamePattern: '[platform]_[name]_[version]_[arch][_setup][ext]'

  build-android:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Java JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d
          link-to-sdk: true

      - name: Set up Rust & Android Targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: "aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android"

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Require Android signing secrets
        if: github.event_name == 'release'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          missing=0
          for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing repository secret: ${name#ANDROID_}"
              missing=1
            fi
          done
          exit "$missing"

      - name: Configure Android release signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "Android signing secrets not set; release APK will be unsigned."
            exit 0
          fi
          KEY_PASS="${ANDROID_KEY_PASSWORD:-$ANDROID_KEYSTORE_PASSWORD}"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > src-tauri/gen/android/upload-keystore.jks
          {
            echo "password=${ANDROID_KEYSTORE_PASSWORD}"
            echo "keyPassword=${KEY_PASS}"
            echo "keyAlias=${ANDROID_KEY_ALIAS}"
            echo "storeFile=upload-keystore.jks"
          } > src-tauri/gen/android/keystore.properties

      - name: Build Android APK
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: npx tauri android build --apk

      - name: Verify signed APK
        if: github.event_name == 'release'
        run: |
          apk_dir=src-tauri/gen/android/app/build/outputs/apk/universal/release
          signed="${apk_dir}/app-universal-release.apk"
          unsigned="${apk_dir}/app-universal-release-unsigned.apk"
          if [ -f "$unsigned" ] && [ ! -f "$signed" ]; then
            echo "::error::Build produced an unsigned APK; check signing configuration."
            exit 1
          fi
          if [ ! -f "$signed" ]; then
            echo "::error::Signed APK not found at ${signed}"
            exit 1
          fi

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'release'
        with:
          files: src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
