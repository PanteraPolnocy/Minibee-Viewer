name: Release (build + attach installers)

# Builds native bundles for Windows, macOS (universal), Linux, and Android whenever a
# GitHub Release is published, and attaches the artifacts to that release.
#
# Flow: create/publish a Release in the GitHub UI (tag e.g. v0.5.1) -> this
# workflow builds on all three OSes and uploads the installers to it.
# `workflow_dispatch` is also allowed for a manual dry run (no upload unless a
# matching release exists).

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write # required to upload assets to the release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest      # produces a universal (arm64 + x86_64) .app/.dmg
            args: "--target universal-apple-darwin"
          - platform: ubuntu-latest      # .deb / .rpm / .AppImage
            args: ""
          - platform: windows-latest    # NSIS .exe + MSI
            args: ""
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install frontend/CLI dependencies
        run: npm ci

      - name: Build and upload to the release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Upload to the release that triggered this run.
          releaseId: ${{ github.event.release.id }}
          args: ${{ matrix.args }}
          assetNamePattern: '[platform]_[name]_[version]_[arch][_setup][ext]'

  build-android:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Java JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d
          link-to-sdk: true

      - name: Set up Rust & Android Targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: "aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android"

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Android APK
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: npx tauri android build --apk

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'release'
        with:
          files: src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
